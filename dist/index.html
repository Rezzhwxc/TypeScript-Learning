<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Learning Console</title>
</head>
<body>
    <!-- <button id="butt">Button</button> -->
    <h1 class="txt">Task board</h1>

    <section class="board">

        <button id="createTask" data-tooltip="Create new Task">+</button>
        <div class="box">
            <h1 id="zadacha">Задача</h1>
            <h1 id="active" class="trueActive">Активное</h1>
            <p id="level">Сложность - Легкая</p>
            <p id="createdAt">Создано:</p>
            <p id="editedAt">Изменений не было</p>
            <div id="boxButt">
            <button id="complete">Готово</button>
            <button id="redakt">Редактировать</button>
            </div>
        </div>
        <div class="box">
            <h1 id="zadacha">Задачa</h1>
            <h1 id="active" class="falseActive">Неактивное</h1>
            <p id="level">Сложность - Средняя</p>
            <p id="createdAt">Создано:</p>
            <p id="editedAt">Изменений не было</p>
            <div id="boxButt">
            <button id="complete">Готово</button>
            <button id="redakt">Редактировать</button>
            </div>
        </div>
        <div class="box">
            <h1 id="zadacha">Задача</h1>
            <h1 id="active" class="trueActive">Активное</h1>
            <p id="level">Сложность - Средняя</p>
            <p id="createdAt">Создано:</p>
            <p id="editedAt">Изменений не было</p>
            <div id="boxButt">
                <button id="complete">Готово</button>
                <button id="redakt">Редактировать</button>
            </div>
        </div>
        <div class="box">
            <h1 id="zadacha">Задача</h1>
            <h1 id="active" class="trueActive">Активное</h1>
            <p id="level">Сложность - Высокая</p>
            <p id="createdAt">Создано:</p>
            <p id="editedAt">Изменений не было</p>
            <div id="boxButt">
            <button id="complete">Готово</button>
            <button id="redakt">Редактировать</button>
            </div>
        </div>
    </section>
    
    <!-- <script src="main.js"></script> -->
    <script src="data.js"></script>
</body>
</html>
