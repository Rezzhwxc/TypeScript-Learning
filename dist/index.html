<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Learning Console</title>
</head>
<body>
    <!-- <button id="butt">Button</button> -->
    <h1 class="txt">Task board</h1>

    <section id="board">

        <button id="createTask" type="button" data-tooltip="Create new Task">+</button>

        
    </section>
    

    <div id="inputBox" style="display: none;">
        <h1>Create Task</h1>
        <form id="taskForm" method="dialog">
            <input name="titleTask" type="text" placeholder="Название задачи"/>

            <select name="activeTask" id="selectActive">
                <option value="active">Активное</option>
                <option value="done">Неактивное</option>
            </select>

            <select name="levelTask" id="selectLevel">
                <option value="low">Легкая</option>
                <option value="medium">Средняя</option>
                <option value="high">Высокая</option>
            </select>

            <button type="submit" id="conf">Сохранить</button>
            <button type="button" id="cancelBtn">Отмена</button>
        </form>
    </div>
    
    <!-- <script src="main.js"></script> -->
    <script src="data.js"></script>
</body>
</html>
